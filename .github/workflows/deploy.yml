name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # No committed lockfile: npm 11 (local) writes optional platform deps
      # without a version, which npm 10 (older runners) rejects with
      # "Invalid Version". Resolving fresh with `npm install` avoids that.
      - run: npm install --no-audit --no-fund
      # VITE_BASE must match "/<repo-name>/" for project pages.
      - run: npm run build
        env:
          VITE_BASE: /sungrow-developers-daybook-review-2026/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
